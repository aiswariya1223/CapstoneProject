name: Deploy Full-Stack Blog to AWS

on:
  push:
    branches:
      - main  # Triggers deployment whenever you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code from GitHub
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 43.204.141.76
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/blog-project-starter-backend
            git pull origin main
            npm install
            pm2 restart capstone-blog || pm2 start index.js --name "capstone-blog"